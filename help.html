<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Elinker</title>
  <link rel="icon" type="image/png" href="assets/images/favico.png">
    <link rel="stylesheet" href="assets/css/help.css">
</head>

<body>
    <video autoplay loop muted playsinline class="background-clip">
        <source src="assets/videos/video0.mp4" type="video/mp4">
    </video>

    <div>
        <a href="/" class="back-btn">⬅ Back</a>
    </div>

    <div class="container">
        <h2><span>C</span>ontact <span>U</span>s</h2>
        <p>Leave your message and we will get back to you shortly</p>

        <form onsubmit="event.preventDefault(); sendToWhatsapp();">
            <div class="input-group">
                <div class="input-box">
                    <input id="name" type="text" placeholder="Full Name" required>
                </div>
                <div class="input-box">
                    <input id="email" type="email" placeholder="Email" required>
                </div>
            </div>
            <textarea id="message" rows="6" placeholder="Your Message" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>

    <script src="assets/js/whatsapp.js"></script>
</body>

</html>
